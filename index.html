<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GO 👉👉✋</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
            text-align: center;
        }
        #webcam-container canvas {
            display: none;
            border-radius: 8px;
        }
        #webcam-container.active canvas {
            display: block;
        }
        #label-container div {
            font-size: 1.1rem;
            padding: 0.25rem 0;
        }
        button {
            padding: 0.6rem 1.5rem;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 6px;
            border: none;
            color: white;
            background: #2563eb;
            margin: 1rem 0;
        }
        button.stop { background: #dc2626; }
        button:hover { opacity: 0.9; }

                /* Game track */
        #game-track {
            position: relative;
            width: 100%;
            height: 80px;
            border-radius: 12px;
            margin: 1.5rem 0;
            overflow: visible;
        }

        /* The box / goal zone */
        #box {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2rem;
            line-height: 1;
            padding: 6px 10px;
            border-radius: 10px;
            border: 3px solid #94a3b8;
            background: #e2e8f0;
            transition: background 0.2s, border-color 0.2s;
        }
        #box.in-range {
            border-color: #f59e0b;
            background: #fef3c7;
        }
        #box.winning {
            border-color: #22c55e;
            background: #dcfce7;
        }

        /* Timer bar inside the box zone */
        #timer-bar-container {
            position: absolute;
            bottom: -18px;
            left: 0;
            width: 100%;
            height: 8px;
            background: #cbd5e1;
            border-radius: 4px;
            overflow: hidden;
            display: none;
        }
        #timer-bar {
            height: 100%;
            width: 0%;
            background: #f59e0b;
            border-radius: 4px;
            transition: width 0.1s linear, background 0.2s;
        }
        #timer-bar.winning {
            background: #22c55e;
        }

        /* Player */
        #player {
            position: absolute;
            top: 50%;
            transform: translateY(-50%) translateX(0px);
            font-size: 2rem;
            line-height: 1;
            transition: transform 0.05s linear;
            left: 0;
        }

        #message {
            font-size: 1.4rem;
            font-weight: bold;
            min-height: 2rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <h1>GO 👉👉✋</h1>
    <p><bold>Instructions</bold></p>
    <ol style="text-align:left; display:inline-block; margin-top:0;">
    <li>Click "Start Camera" and allow access to your webcam.</li>
    <li>Show the <strong>Go</strong> gesture 👉 to move the player right.</li>
    <li>Do <strong>Nothing</strong> to drift back.</li>
    <li>Reach the 📦 and show <strong>Stop</strong> ✋ — hold it for 3 seconds to win!</li>
    </ol>

    <button id="toggleButton" onclick="toggleCamera()">Start Camera</button>
    <button id="restartButton" onclick="restart()" style="display:none; background:#16a34a;">Restart Game</button>

    <div id="webcam-container"></div>
    <div id="label-container"></div>

    <div id="message"></div>

    <div id="game-track">
        <div id="player">🚶‍➡️</div>
        <div id="box">
            📦
            <div id="timer-bar-container">
                <div id="timer-bar"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script>
        // REPLACE THIS with your model URL from Teachable Machine:
        const URL = "https://teachablemachine.withgoogle.com/models/ZC7IAHRrc/";

        let model, webcam, labelContainer, maxPredictions;
        let isRunning = false;

        // GAME VARIABLES
        const requiredTime = 3000; //required time to hold the gesture in ms
        const variation = 50; // how much the box can vary from the exact location to win
        
        let trackWidth, boxLeft, MAX_LOCATION, MIN_LOCATION;

        const player = {
            location: 0,
            speed: 5,
            element: document.getElementById("player")
        };

        let lastGoTime = 0;
        let gameWon = false;

        const boxEl       = document.getElementById("box");
        const timerBarContainer = document.getElementById("timer-bar-container");
        const timerBar    = document.getElementById("timer-bar");
        const messageEl   = document.getElementById("message");
        const trackEl     = document.getElementById("game-track");
        const trackOffsetLeft = trackEl.getBoundingClientRect().left;

        function setupGame() {
            trackWidth   = trackEl.offsetWidth;
            boxLeft      = trackWidth - 60;   // ~60px from right edge of track
            MAX_LOCATION = window.innerWidth - trackOffsetLeft - player.element.offsetWidth;
            MIN_LOCATION = 0;

            boxEl.style.left = boxLeft + "px";
        }
     
        async function init() {
            setupGame();

            model = await tmImage.load(URL + "model.json", URL + "metadata.json");
            maxPredictions = model.getTotalClasses();

            webcam = new tmImage.Webcam(300, 300, true);
            await webcam.setup();
            await webcam.play();

            const container = document.getElementById("webcam-container");
            container.innerHTML = "";
            container.appendChild(webcam.canvas);
            container.classList.add("active");

            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {
                labelContainer.appendChild(document.createElement("div"));
            }

            isRunning = true;
            gameWon = false;
            player.location = 0;
            lastGoTime = 0;
            window.requestAnimationFrame(loop);
        }

        async function loop() {
            if (!isRunning) return;
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            if (gameWon) return;

            const prediction = await model.predict(webcam.canvas);

            // Find the class with the highest probability
            let topClass = prediction[0];
            for (let i = 1; i < prediction.length; i++) {
                if (prediction[i].probability > topClass.probability) {
                    topClass = prediction[i];
                }
            }

            // topClass.className is the winning label
            // topClass.probability is how confident the model is
            console.log(topClass.className, topClass.probability);

            // Update the display
            // for (let i = 0; i < maxPredictions; i++) {
            //     const classPrediction =
            //         prediction[i].className + ": " + prediction[i].probability.toFixed(2);
            //     labelContainer.childNodes[i].innerHTML = classPrediction;
            // }

            // Change background color based on the top prediction
            if (topClass.className === "Go") {
                document.body.style.backgroundColor = "limegreen";
            } else if (topClass.className === "Stop") {
                document.body.style.backgroundColor = "firebrick"; // red
            } else if (topClass.className === "Nothing") {
                document.body.style.backgroundColor = "gainsboro"; // gray
            } 
            else {
                document.body.style.backgroundColor = "white";
            }   

            game(topClass.className);
        }

        async function toggleCamera() {
            const button = document.getElementById("toggleButton");
            if (!isRunning) {
                await init();
                button.textContent = "Stop Camera";
                button.classList.add("stop");
            } else {
                isRunning = false;
                webcam.stop();
                document.getElementById("webcam-container").classList.remove("active");
                button.textContent = "Start Camera";
                button.classList.remove("stop");
            }
        }

        async function game(prediction) {
            if (gameWon) return;

            // Move player
            if (prediction === "Go") {
                player.location = Math.min(player.location + player.speed, MAX_LOCATION - 200);
            } else if (prediction === "Nothing") {
                player.location = Math.max(player.location - 2, MIN_LOCATION);
            }

            // Apply position
            player.element.style.transform = `translateY(-50%) translateX(${player.location}px)`;

            const atBox = Math.abs(player.location - boxLeft) <= variation;

            if (atBox) {
                boxEl.classList.add("in-range");

                if (prediction === "Stop") {
                    // Start or continue the hold timer
                    if (lastGoTime === 0) lastGoTime = Date.now();

                    const heldFor   = Date.now() - lastGoTime;
                    const progress  = Math.min(heldFor / requiredTime, 1);
                    const secondsLeft = Math.ceil((requiredTime - heldFor) / 1000);

                    // Show timer bar
                    timerBarContainer.style.display = "block";
                    timerBar.style.width = (progress * 100) + "%";

                    if (progress >= 1) {
                        timerBar.classList.add("winning");
                        boxEl.classList.remove("in-range");
                        boxEl.classList.add("winning");
                        messageEl.textContent = "You win! 🎉";
                        gameWon = true;

                       webcam.stop();
                       isRunning = false;
                       document.getElementById("toggleButton").style.display = "none";
                       document.getElementById("restartButton").style.display = "inline-block";
                    } else {
                        messageEl.textContent = `Hold it! ${secondsLeft}s...`;
                    }
                } else {
                    // At the box but not stopping — reset timer
                    lastGoTime = 0;
                    timerBarContainer.style.display = "none";
                    timerBar.style.width = "0%";
                    timerBar.classList.remove("winning");
                    messageEl.textContent = "📦 Now stop! ✋";
                }
            } else {
                // Not at box — reset everything
                boxEl.classList.remove("in-range", "winning");
                timerBarContainer.style.display = "none";
                timerBar.style.width = "0%";
                timerBar.classList.remove("winning");
                lastGoTime = 0;
                messageEl.textContent = "";
            }
        }

        function resetGame() {
            player.location = 0;
            lastGoTime = 0;
            player.element.style.transform = `translateY(-50%) translateX(0px)`;
            boxEl.classList.remove("in-range", "winning");
            timerBarContainer.style.display = "none";
            timerBar.style.width = "0%";
            timerBar.classList.remove("winning");
            messageEl.textContent = "";
            document.body.style.backgroundColor = "";
            document.getElementById("restartButton").style.display = "none";
            gameWon = false;
        }

        function restart() {
            resetGame();
            init();
        }
    </script>
</body>
</html>
